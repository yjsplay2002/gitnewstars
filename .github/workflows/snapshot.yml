name: Weekly Trending Snapshot

# Runs early every Monday (UTC) to archive the week that just ended, and can
# also be triggered manually. Commits data/weeks/<week>.json back to the repo,
# which triggers an automatic Vercel redeploy.
on:
  schedule:
    - cron: "10 0 * * 1" # Mondays 00:10 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Generate weekly snapshot
        run: node scripts/snapshot.mjs

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weeks
          if git diff --staged --quiet; then
            echo "No new snapshot to commit."
          else
            git commit -m "chore: weekly trending snapshot"
            # Rebase onto latest main first — the checkout SHA is pinned at
            # trigger time, so any push landing meanwhile rejects ours.
            git pull --rebase origin main
            git push
          fi
